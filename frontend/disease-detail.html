<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EpiWatch — Деталі захворювання</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<main class="page">
  <div class="container" id="detailContent">
    <div style="color:#5c6378;padding:80px;text-align:center;">Завантаження...</div>
  </div>
</main>

<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const id = new URLSearchParams(window.location.search).get('id');
    const d = EpiWatch.getDiseaseById(id);
    const content = document.getElementById('detailContent');

    if (!d) {
      content.innerHTML = `<div style="padding:80px;text-align:center;">Захворювання не знайдено. <a href="diseases.html">Повернутися</a></div>`;
      return;
    }
    document.title = `EpiWatch — ${d.name}`;
    const riskPct = Math.round((d.deaths / d.cases) * 100);
content.innerHTML = `
  <div class="breadcrumb anim">
    <a href="diseases.html">Захворювання</a> › <span>${d.name}</span>
  </div>
  <div class="detail-header anim-1" style="display:flex; justify-content:space-between; margin-bottom:28px;">
    <h1>${d.name}</h1>
    <span class="badge ${EpiWatch.levelBadgeClass(d.level)}">${d.levelLabel}</span>
  </div>
  <div class="stat-cards anim-2" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:16px;">
    <div class="stat-card">Всього: ${d.cases.toLocaleString('uk-UA')}</div>
    <div class="stat-card red">Смертей: ${d.deaths.toLocaleString('uk-UA')}</div>
    <div class="stat-card yellow">Летальність: ${riskPct}%</div>
  </div>
`;
  });
</script>
</body>
</html>
