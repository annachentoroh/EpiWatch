<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EpiWatch — Деталі захворювання</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
<main class="page">
  <div class="container" id="detailContent">
    <div style="color:#5c6378;padding:80px;text-align:center;">Завантаження...</div>
  </div>
</main>

<script src="js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const id = new URLSearchParams(window.location.search).get('id');
    const d = EpiWatch.getDiseaseById(id);
    const content = document.getElementById('detailContent');

    if (!d) {
      content.innerHTML = `<div style="padding:80px;text-align:center;">Захворювання не знайдено. <a href="diseases.html">Повернутися</a></div>`;
      return;
    }
    document.title = `EpiWatch — ${d.name}`;
    const riskPct = Math.round((d.deaths / d.cases) * 100);
content.innerHTML = `
      <div style="margin-bottom:20px;font-size:13px;color:#5c6378;" class="anim">
        <a href="diseases.html" style="color:#9aa0b4;">Захворювання</a>
        <span style="margin:0 6px;">›</span>
        <span style="color:#e8eaf0;">${d.name}</span>
      </div>

      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:28px;" class="anim anim-1">
        <div>
          <h1 style="font-family:var(--font-display);font-size:34px;font-weight:800;margin-bottom:6px;">${d.name}</h1>
          <div style="font-size:14px;color:#9aa0b4;">${d.origin} · Збудник: <span style="color:#e8eaf0;">${d.pathogen}</span></div>
        </div>
        <span class="badge ${EpiWatch.levelBadgeClass(d.level)}" style="font-size:14px;padding:6px 14px;">
          <span class="badge__dot"></span>${d.levelLabel}
        </span>
      </div>

      <div class="stat-cards anim anim-2" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-bottom:24px;">
        <div class="stat-card">
          <div class="stat-card__label">Заражень</div>
          <div class="stat-card__value">${d.cases.toLocaleString('uk-UA')}</div>
        </div>
        <div class="stat-card red">
          <div class="stat-card__label">Смертей</div>
          <div class="stat-card__value red">${d.deaths.toLocaleString('uk-UA')}</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-card__label">Летальність</div>
          <div class="stat-card__value yellow">${riskPct}%</div>
        </div>
      </div>

      <div class="detail-grid anim anim-3" style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
        <div class="main-info">
          <div class="card" style="margin-bottom:20px;">
            <h2 style="font-size:17px;font-weight:700;margin-bottom:16px;">Властивості</h2>
            <div class="info-list">
              <div class="info-row"><label>Тип збудника</label><span>${d.type}</span></div>
              <div class="info-row"><label>Шлях передачі</label><span>${d.transmission}</span></div>
              <div class="info-row"><label>Регіони</label><span>${d.regions.join(', ')}</span></div>
            </div>
          </div>
          <div class="card">
            <h2 style="font-size:17px;font-weight:700;margin-bottom:14px;">Симптоми</h2>
            <div class="symptom-tags" style="display:flex; flex-wrap:wrap; gap:8px;">
              ${d.symptoms.map(s => `<span class="symptom-tag">${s}</span>`).join('')}
            </div>
          </div>
        </div>
        
        <div id="sidebarTarget"></div>
      </div>
`;
  });
</script>
</body>
</html>
