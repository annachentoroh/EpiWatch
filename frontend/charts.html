<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EpiWatch — Статистика та графіки</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>

<div id="nav-placeholder"></div>

<main class="page">
  <div class="container">

    <div class="page-header anim">
      <h1>Статистика епідеміологічної ситуації</h1>
      <p>Актуальна інформація про динаміку поширення захворювань у світі</p>
    </div>

    <!--STAT CARDS-->
    <div class="stat-cards anim anim-1">
      <div class="stat-card">
        <div class="stat-card__label">Всього випадків</div>
        <div class="stat-card__value teal">232K</div>
      </div>
      <div class="stat-card red">
        <div class="stat-card__label">Смертей (загалом)</div>
        <div class="stat-card__value red">3.1K</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-card__label">Одужали</div>
        <div class="stat-card__value yellow">225K</div>
      </div>
    </div>

    <!--MAIN CHART-->
    <div class="chart-wrap anim anim-2" style="margin-bottom:24px;">
      <div class="chart-header">
        <div>
          <div class="chart-title">Динаміка поширення вірусу</div>
          <div style="font-size:13px;color:#9aa0b4;margin-top:2px;">Нові випадки по тижнях</div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <select class="filter-select" id="chartDisease" style="min-width:180px;">
            <option value="hantavirus">Хантавірус</option>
            <option value="dengue">Гарячка денге</option>
            <option value="mpox">Мавпяча віспа</option>
            <option value="cholera">Холера</option>
            <option value="measles">Кір</option>
          </select>
          <div class="time-tabs">
            <button class="time-tab" data-period="7">7 дн</button>
            <button class="time-tab" data-period="30">30 дн</button>
            <button class="time-tab" data-period="90">3 міс</button>
            <button class="time-tab" data-period="365">Рік</button>
            <button class="time-tab active" data-period="all">Весь час</button>
          </div>
        </div>
      </div>
      <div style="height:300px;">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <!--SECONDARY CHARTS-->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;" class="anim anim-3">
      <div class="chart-wrap">
        <div class="chart-header">
          <div class="chart-title">Порівняння за кількістю випадків</div>
        </div>
        <div style="height:260px;"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-header">
          <div class="chart-title">Розподіл захворювань</div>
        </div>
        <div style="height:260px;"><canvas id="pieChart"></canvas></div>
      </div>
    </div>
