<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EpiWatch — Захворювання</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<main class="page">
  <div class="container">

    <!-- SEARCH HERO -->
    <div class="search-hero anim">
      <h1 style="font-family:var(--font-display);font-size:28px;font-weight:700;margin-bottom:14px;">
        Пошук захворювань
      </h1>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Пошук за симптомами або назвою вірусу..." autocomplete="off">
      </div>
      <p class="search-hint" id="searchHint">Введіть симптом (лихоманка, кашель, висипка...) або назву захворювання</p>
    </div>

    <!-- SEARCH RESULTS (hidden by default) -->
    <div id="searchResults" style="display:none;margin-bottom:32px;" class="anim">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div style="font-family:var(--font-display);font-size:17px;font-weight:600;">Результати пошуку</div>
        <div id="searchMatchInfo" style="font-size:13px;color:#9aa0b4;"></div>
      </div>
      <div id="searchResultsList"></div>
      <button class="btn btn--ghost" style="margin-top:12px;" onclick="clearSearch()">← Показати всі захворювання</button>
    </div>

    <!-- FILTERS ROW -->
    <div class="filters anim anim-1" id="filtersRow">
      <div class="filter-group">
        <label>Тип</label>
        <select class="filter-select" id="filterDType" onchange="renderCards()">
          <option value="">Всі типи</option>
          <option>Вірус</option>
          <option>Бактерія</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Рівень небезпеки</label>
        <select class="filter-select" id="filterDLevel" onchange="renderCards()">
          <option value="">Всі рівні</option>
          <option value="normal">Нормальний</option>
          <option value="medium">Середній</option>
          <option value="danger">Небезпечний</option>
        </select>
      </div>
      <div style="margin-left:auto;display:flex;align-items:flex-end;">
        <span id="totalCount" style="font-size:13px;color:#5c6378;"></span>
      </div>
    </div>
