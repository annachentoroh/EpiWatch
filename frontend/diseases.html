<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EpiWatch — Захворювання</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<main class="page">
  <div class="container">

    <!-- SEARCH HERO -->
    <div class="search-hero anim">
      <h1 style="font-family:var(--font-display);font-size:28px;font-weight:700;margin-bottom:14px;">
        Пошук захворювань
      </h1>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Пошук за симптомами або назвою вірусу..." autocomplete="off">
      </div>
      <p class="search-hint" id="searchHint">Введіть симптом (лихоманка, кашель, висипка...) або назву захворювання</p>
    </div>

    <!-- SEARCH RESULTS (hidden by default) -->
    <div id="searchResults" style="display:none;margin-bottom:32px;" class="anim">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div style="font-family:var(--font-display);font-size:17px;font-weight:600;">Результати пошуку</div>
        <div id="searchMatchInfo" style="font-size:13px;color:#9aa0b4;"></div>
      </div>
      <div id="searchResultsList"></div>
      <button class="btn btn--ghost" style="margin-top:12px;" onclick="clearSearch()">← Показати всі захворювання</button>
    </div>

    <!-- FILTERS ROW -->
    <div class="filters anim anim-1" id="filtersRow">
      <div class="filter-group">
        <label>Тип</label>
        <select class="filter-select" id="filterDType" onchange="renderCards()">
          <option value="">Всі типи</option>
          <option>Вірус</option>
          <option>Бактерія</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Рівень небезпеки</label>
        <select class="filter-select" id="filterDLevel" onchange="renderCards()">
          <option value="">Всі рівні</option>
          <option value="normal">Нормальний</option>
          <option value="medium">Середній</option>
          <option value="danger">Небезпечний</option>
        </select>
      </div>
      <div style="margin-left:auto;display:flex;align-items:flex-end;">
        <span id="totalCount" style="font-size:13px;color:#5c6378;"></span>
      </div>
    </div>

        <!-- DISEASE CARDS GRID -->
    <div id="cardsGrid" class="anim anim-2" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;"></div>

  </div>
</main>

<div id="footer-placeholder"></div>
<script src="js/app.js"></script>
<script>
  let allDiseases = [];

  function renderCards() {
    allDiseases = EpiWatch.getDiseases();
    const typeF  = document.getElementById('filterDType').value;
    const levelF = document.getElementById('filterDLevel').value;
    let filtered = allDiseases;
    if (typeF)  filtered = filtered.filter(d => d.type === typeF);
    if (levelF) filtered = filtered.filter(d => d.level === levelF);

    document.getElementById('totalCount').textContent = `Показано: ${filtered.length} захворювань`;

    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = filtered.map(d => `
      <div class="disease-card" onclick="location.href='disease-detail.html?id=${d.id}'">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div class="disease-card__name">${d.name}</div>
          <span class="badge ${EpiWatch.levelBadgeClass(d.level)}">
            <span class="badge__dot"></span>${d.levelLabel}
          </span>
        </div>
        <div class="disease-card__meta">${d.origin} · ${d.type}: ${d.pathogen}</div>
        <div class="disease-card__stats">
          <div class="disease-card__stat">
            <label>Випадки</label>
            <span>${EpiWatch.formatNumber(d.cases)}</span>
          </div>
          <div class="disease-card__stat">
            <label>Смерті</label>
            <span style="color:var(--red)">${EpiWatch.formatNumber(d.deaths)}</span>
          </div>
          <div class="disease-card__stat">
            <label>Одужали</label>
            <span style="color:var(--teal)">${EpiWatch.formatNumber(d.recovered)}</span>
          </div>
        </div>
        <div class="disease-card__footer">
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${d.symptoms.slice(0,3).map(s => `<span class="symptom-tag">${s}</span>`).join('')}
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa0b4" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>`).join('');
  }

  //Search
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { clearSearch(); return; }

    const diseases = EpiWatch.getDiseases();
    const results = diseases.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.pathogen.toLowerCase().includes(q) ||
      d.symptoms.some(s => s.toLowerCase().includes(q)) ||
      d.type.toLowerCase().includes(q)
    );

    document.getElementById('searchResults').style.display = 'block';
    document.getElementById('filtersRow').style.display = 'none';
    document.getElementById('cardsGrid').style.display = 'none';

    const matchWord = diseases[0]?.symptoms.some(s => s.toLowerCase().includes(q)) ? 'за симптомом' : 'за назвою';
    document.getElementById('searchMatchInfo').textContent =
      `Збігів: ${results.length}/${diseases.length} (${Math.round(results.length/diseases.length*100)}%) · пошук ${matchWord}`;

    document.getElementById('searchResultsList').innerHTML = results.length
      ? results.map(d => `
          <div class="search-result" onclick="location.href='disease-detail.html?id=${d.id}'">
            <div class="search-result__main">
              <div class="search-result__name">${d.name}</div>
              <div class="search-result__meta">${d.pathogen} · ${d.origin} · ${EpiWatch.formatNumber(d.cases)} випадків</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="badge ${EpiWatch.levelBadgeClass(d.level)}">
                <span class="badge__dot"></span>${d.levelLabel}
              </span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
          </div>`).join('')
      : `<div style="color:#5c6378;padding:30px;text-align:center;">Нічого не знайдено за запитом «${q}»</div>`;
  });

  function clearSearch() {
    searchInput.value = '';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('filtersRow').style.display = 'flex';
    document.getElementById('cardsGrid').style.display = 'grid';
  }

  //Init from URL query
  document.addEventListener('DOMContentLoaded', () => {
    renderCards();
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      searchInput.value = q;
      searchInput.dispatchEvent(new Event('input'));
    }
  });
</script>
</body>
</html>
